<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roy Steves</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 300;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .tagline {
      font-size: 1.25rem;
      color: #94a3b8;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4f8fea, transparent);
      margin: 2rem auto;
    }

    .coming-soon {
      font-size: 0.875rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Roy Steves</h1>
    <p class="tagline">Something interesting is on the way</p>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
  </div>
</body>
</html>
